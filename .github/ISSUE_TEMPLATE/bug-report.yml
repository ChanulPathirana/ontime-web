name: Bug Report
description: Report a bug or issue in the system
title: "[Bug] "
labels: ["type: bug", "status: todo"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thanks for reporting a bug! Please provide as much detail as possible.
        
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How serious is this bug?
      options:
        - 🔴 Critical - System crash, data loss, security issue
        - 🟠 High - Major feature broken, blocking work
        - 🟡 Medium - Feature partially broken, workaround exists
        - 🟢 Low - Minor issue, cosmetic problem
    validations:
      required: true
      
  - type: dropdown
    id: affected-role
    attributes:
      label: Affected Area
      description: Which team area does this bug affect?
      options:
        - Frontend (App Structure)
        - Map & Tracking
        - Real-Time Communication
        - UI/UX
        - Integration
        - Backend
        - Unknown
    validations:
      required: true
      
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where does this bug occur?
      options:
        - Web (Next.js)
        - Mobile (Flutter) - Android
        - Mobile (Flutter) - iOS
        - Both Web & Mobile
        - Backend API
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: The map doesn't load when clicking on a bus from the list
    validations:
      required: true
      
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to home page
        2. Click on any bus in the list
        3. Navigate to map view
        4. Map shows blank screen
    validations:
      required: true
      
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Map should load with the bus location marked
    validations:
      required: true
      
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: Map shows blank white screen, console shows "Cannot read property 'lat' of undefined"
    validations:
      required: true
      
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment
      placeholder: |
        - Browser: Chrome 124 / Safari 17 / Firefox 125
        - OS: Windows 11 / macOS 14 / Ubuntu 22.04 / Android 14 / iOS 17
        - App Version: 1.2.3
        - Screen Size: Desktop / Mobile
    validations:
      required: false
      
  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Screenshots
      description: Include any error messages, console logs, or screenshots
      placeholder: |
        ```
        Error: Cannot read property 'lat' of undefined
          at BusMap.render (map.tsx:45)
        ```
        
        [Attach screenshot if applicable]
    validations:
      required: false
      
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful
