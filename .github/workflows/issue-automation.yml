name: Issue Automation

on:
  issues:
    types: [opened, labeled, assigned]
  pull_request:
    types: [opened, closed]

jobs:
  auto-label-by-role:
    name: Auto-label issues by role
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Add component labels based on role
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body || '';
            const labels = [];
            
            // Check title prefix and add appropriate labels
            if (title.startsWith('[frontend]')) {
              labels.push('role: frontend-lead', 'component: web');
            } else if (title.startsWith('[map]')) {
              labels.push('role: map-tracking');
            } else if (title.startsWith('[realtime]')) {
              labels.push('role: realtime-comm');
            } else if (title.startsWith('[ui/ux]')) {
              labels.push('role: ui-ux');
            } else if (title.startsWith('[integration]')) {
              labels.push('role: integration');
            }
            
            // Add platform labels based on content
            if (body.includes('Flutter') || body.includes('Mobile')) {
              labels.push('platform: flutter', 'component: mobile');
            }
            if (body.includes('Next.js') || body.includes('Web')) {
              labels.push('platform: nextjs', 'component: web');
            }
            if (body.includes('Both platforms') || body.includes('Both')) {
              labels.push('platform: both');
            }
            
            // Add priority labels based on content
            if (body.includes('🔴 High') || body.includes('Critical')) {
              labels.push('priority: high');
            } else if (body.includes('🟡 Medium')) {
              labels.push('priority: medium');
            } else if (body.includes('🟢 Low')) {
              labels.push('priority: low');
            }
            
            // Add the labels
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }

  move-to-in-progress:
    name: Move assigned issues to In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    steps:
      - name: Update status label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            // Remove todo label if exists
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'status: todo'
              });
            } catch (error) {
              // Label might not exist, ignore
            }
            
            // Add in-progress label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['status: in-progress']
            });
            
            // Add comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `🚀 Issue assigned to @${context.payload.assignee.login}. Status updated to **In Progress**.`
            });

  pr-opened:
    name: Update issue status on PR creation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - name: Extract issue numbers and update status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // Extract issue numbers from PR body (Closes #123, Fixes #456, Resolves #789)
            const issueRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(issueRegex)];
            
            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              
              try {
                // Remove in-progress label
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'status: in-progress'
                }).catch(() => {});
                
                // Add review label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['status: review']
                });
                
                // Add comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `🔍 PR #${pr.number} has been opened for review. Status updated to **Review**.`
                });
              } catch (error) {
                console.log(`Error updating issue #${issueNumber}:`, error.message);
              }
            }

  pr-merged:
    name: Close issues and update status on PR merge
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - name: Close linked issues and update status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // Extract issue numbers from PR body
            const issueRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(issueRegex)];
            
            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              
              try {
                // Remove review label
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'status: review'
                }).catch(() => {});
                
                // Add done label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['status: done']
                });
                
                // Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed'
                });
                
                // Add completion comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `✅ Completed via PR #${pr.number}. Great work! 🎉`
                });
              } catch (error) {
                console.log(`Error closing issue #${issueNumber}:`, error.message);
              }
            }

  welcome-message:
    name: Welcome new contributors
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Check if first issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const creator = issue.user.login;
            
            // Get all issues by this user
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all'
            });
            
            // If this is their first issue, welcome them
            if (issues.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `👋 Welcome to OnTime! Thanks for creating your first issue. 

Please make sure you've:
- [ ] Used the appropriate issue template
- [ ] Filled in all required fields
- [ ] Added appropriate labels
- [ ] Assigned yourself if you're working on it

Check out our [Project Management Guide](../PROJECT_MANAGEMENT.md) for more information on our workflow.`
              });
            }
