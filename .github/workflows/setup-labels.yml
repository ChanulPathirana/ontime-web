name: Setup Repository Labels

on:
  workflow_dispatch:

jobs:
  setup-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create/Update Labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              // G3 Team Labels (Your Group)
              { name: 'team: g3', color: 'FF5630', description: 'G3 - System Engineering & Interaction' },
              
              // Role Labels (G3 Internal Sub-Teams)
              { name: 'role: frontend-lead', color: '0366d6', description: 'G3.1 - Frontend structure and app setup' },
              { name: 'role: map-tracking', color: '0e8a16', description: 'G3.2 - Map integration and live tracking' },
              { name: 'role: realtime-comm', color: 'fbca04', description: 'G3.3 - Real-time communication (Socket.IO)' },
              { name: 'role: ui-ux', color: 'e99695', description: 'G3.4 - UI/UX design and display features' },
              { name: 'role: integration', color: '5319e7', description: 'G3.5 - Integration and advanced features' },
              
              // Type Labels
              { name: 'type: feature', color: 'a2eeef', description: 'New feature or request' },
              { name: 'type: bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'type: enhancement', color: '84b6eb', description: 'Improvement to existing feature' },
              { name: 'type: documentation', color: '0075ca', description: 'Documentation updates' },
              { name: 'type: refactor', color: 'f9d0c4', description: 'Code refactoring' },
              { name: 'type: test', color: 'd4c5f9', description: 'Testing related' },
              
              // Priority Labels
              { name: 'priority: critical', color: 'b60205', description: '🔴 Critical - Immediate attention required' },
              { name: 'priority: high', color: 'd93f0b', description: '🟠 High priority' },
              { name: 'priority: medium', color: 'fbca04', description: '🟡 Medium priority' },
              { name: 'priority: low', color: '0e8a16', description: '🟢 Low priority' },
              
              // Status Labels
              { name: 'status: todo', color: 'ededed', description: '📋 Not started' },
              { name: 'status: in-progress', color: 'fbca04', description: '🔄 Currently being worked on' },
              { name: 'status: review', color: '0366d6', description: '👀 Ready for review' },
              { name: 'status: blocked', color: 'd73a4a', description: '🚫 Blocked by dependencies' },
              { name: 'status: done', color: '0e8a16', description: '✅ Completed' },
              
              // Component Labels
              { name: 'component: mobile', color: 'c5def5', description: 'Flutter mobile app' },
              { name: 'component: web', color: 'bfdadc', description: 'Next.js web app' },
              { name: 'component: backend', color: 'fef2c0', description: 'Backend services' },
              { name: 'component: api', color: 'c2e0c6', description: 'API related' },
              { name: 'component: database', color: 'bfd4f2', description: 'Database related' },
              
              // Platform Labels
              { name: 'platform: flutter', color: '02569B', description: 'Flutter specific' },
              { name: 'platform: nextjs', color: '000000', description: 'Next.js specific' },
              { name: 'platform: both', color: '5319e7', description: 'Both platforms' },
              
              // External Dependencies (Other Groups)
              { name: 'depends-on: g1', color: 'D4C5F9', description: 'Depends on G1 (Edge/IoT)' },
              { name: 'depends-on: g2', color: 'D4C5F9', description: 'Depends on G2 (Data/ML)' },
              { name: 'depends-on: g4', color: 'D4C5F9', description: 'Depends on G4 (Backend/DevOps)' },
              
              // Additional Labels
              { name: 'good first issue', color: '7057ff', description: 'Good for newcomers' },
              { name: 'help wanted', color: '008672', description: 'Extra attention is needed' },
              { name: 'question', color: 'd876e3', description: 'Further information is requested' },
              { name: 'wontfix', color: 'ffffff', description: 'This will not be worked on' },
              { name: 'duplicate', color: 'cfd3d7', description: 'This issue or pull request already exists' },
            ];
            
            for (const label of labels) {
              try {
                // Try to create the label
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`✅ Created label: ${label.name}`);
              } catch (error) {
                if (error.status === 422) {
                  // Label already exists, update it
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`🔄 Updated label: ${label.name}`);
                } else {
                  console.log(`❌ Error with label ${label.name}:`, error.message);
                }
              }
            }
            
            console.log('✅ All labels processed successfully!');
